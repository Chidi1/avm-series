trigger:
  branches:
    include:
      - main

variables:
  - group: avm-series-variables
  - name: TF_VERSION
    value: '1.6.6'
  - name: WORKING_DIR
    value: '$(Build.SourcesDirectory)'
  - name: TENANT
    value: 'tenantA'

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - prod

stages:

# ------------------------
# INIT & PLAN
# ------------------------
- stage: Plan
  jobs:
    - job: TerraformPlan
      pool:
        vmImage: ubuntu-latest

      steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(TF_VERSION)

        - task: AzureCLI@2
          inputs:
            azureSubscription: 'avm-service-conn'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              cd "$(WORKING_DIR)"

              terraform init \
                -backend-config="resource_group_name=$(TF_STATE_RG)" \
                -backend-config="storage_account_name=$(TF_STATE_SA)" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=$(environment).tfstate"

              terraform plan -out=tfplan
          env:
            TF_VAR_admin_username: $(admin_username)
            TF_VAR_sql_admin: $(sql_admin)
            TF_VAR_sql_password: $(sql_password)
            TF_VAR_subscription_id: $(subscription_id)

        - publish: tfplan
          artifact: tfplan

# ------------------------
# APPLY (WITH APPROVAL)
# ------------------------
- stage: Apply
  dependsOn: Plan
  condition: succeeded()
  jobs:
    - deployment: ApplyTerraform
      environment: $(environment)
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: tfplan

              - task: AzureCLI@2
                inputs:
                  azureSubscription: 'avm-service-conn'
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    cd "$(WORKING_DIR)"

                    terraform init \
                      -backend-config="resource_group_name=$(TF_STATE_RG)" \
                      -backend-config="storage_account_name=$(TF_STATE_SA)" \
                      -backend-config="container_name=tfstate" \
                      -backend-config="key=$(environment).tfstate"

                    terraform apply -auto-approve tfplan
                env:
                  TF_VAR_admin_username: $(admin_username)
                  TF_VAR_sql_admin: $(sql_admin)
                  TF_VAR_sql_password: $(sql_password)
                  TF_VAR_subscription_id: $(subscription_id)